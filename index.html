<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orta Comunitária - Gestão de Tarefas</title>
    <!-- Link para o CSS Externo -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    // Tela de login
    <main id="login-screen">
        <header><img src="imagens/logo-orta.png" alt="Logo Orta" class="logo-grande"></header>
        <form id="form-login">
            <fieldset>
                <legend>Acesse sua conta</legend>
                <label for="email">E-MAIL:</label>
                <input type="email" id="email" required>
                <label for="senha">SENHA:</label>
                <input type="password" id="senha" required>
                <button type="submit">LOGIN</button>
            </fieldset>
        </form>
    </main>

    // Tela do Dashboard
    <main id="dashboard-screen" class="hidden">
        <header class="dash-header">
            <div class="user-info">
                <img src="imagens/perfil-joao.png" alt="Foto João" class="profile-pic">
                <div>
                    <h1>OLÁ, SEU JOÃO!</h1>
                    <p>O que vamos fazer hoje?</p>
                </div>
            </div>
            <img src="imagens/logo-orta-small.png" alt="Logo" class="logo-small">
        </header>

        <nav class="actions-section" style="padding: 20px;">
            <a href="novo-plantio.html" class="card-acao">
                <h3>+ Novo Plantio</h3>
                <p>Iniciar nova cultura</p>
            </a>
        </nav>

        <section id="lista-plantios-dash" style="padding: 20px;">
            <h3>Últimos Plantios:</h3>
            <div id="container-itens"><!-- Itens do LocalStorage aparecem aqui --></div>
        </section>

        <section class="map-section" style="padding: 20px;">
            <h2>Localização da Horta</h2>
            <iframe title="Mapa" src="https://www.google.com/maps/embed?pb=..." width="100%" height="250"
                style="border:3px solid black;" allowfullscreen="" loading="lazy"></iframe>
        </section>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('logado') === 'true') {
            loginScreen.classList.add('hidden');
            dashScreen.classList.remove('hidden');
            carregarPlantiosNoDash();
        }
        const loginForm = document.getElementById('form-login');
        const loginScreen = document.getElementById('login-screen');
        const dashScreen = document.getElementById('dashboard-screen');

        // Função para carregar dados salvos
        function carregarPlantiosNoDash() {
            const container = document.getElementById('container-itens');
            const plantiosSalvos = JSON.parse(localStorage.getItem('meusPlantios')) || [];

            if (plantiosSalvos.length === 0) {
                container.innerHTML = "<p>Nenhum plantio registrado.</p>";
                return;
            }

            container.innerHTML = "";
            plantiosSalvos.reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-plantio';
                div.innerHTML = `
                    <strong>CULTURA:</strong> ${item.cultura}<br>
                    <strong>ÁREA:</strong> ${item.area}m² | <strong>DATA:</strong> ${item.data}
                `;
                container.appendChild(div);
            });
        }
        // Evento de Login
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            loginScreen.classList.add('hidden');
            dashScreen.classList.remove('hidden');
            carregarPlantiosNoDash();
        });
    </script>
</body>

</html>
