<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horta Comunitária - Gestão de Tarefas</title>
    <!-- Link para o CSS Externo -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos de Fallback para garantir funcionamento caso o style.css mude */
        .hidden { display: none !important; }
        .item-plantio {
            background: #ffffff;
            border: 3px solid #000000;
            padding: 15px;
            margin-bottom: 15px;
            font-size: 1.1rem;
            color: #000000;
        }
    </style>
</head>

<body>
    <main id="content-area">
        
        <section id="login-screen">
            <header>
                <img src="https://lh3.googleusercontent.com/p/AF1QipPjqwWeZ5Tf_bHVTfWYMDTJ3OdpHUO3fNsZksGg=w243-h174-n-k-no-nu"
                    alt="Logo Horta Comunitária" class="logo-grande">
            </header>
            <form id="form-login">
                <fieldset>
                    <legend>Acesse sua conta</legend>
                    <label for="email">E-MAIL:</label>
                    <input type="email" id="email" required>
                    
                    <label for="senha">SENHA:</label>
                    <input type="password" id="senha" required>
                    
                    <button type="submit">LOGIN</button>
                </fieldset>
            </form>
        </section>

        <section id="dashboard-screen" class="hidden" aria-hidden="true">
            <header class="dash-header">
                <div class="user-info">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSTdZViE66j-NjGxox1Yz2JCNB7cP_byawE3w&s
                        alt="Foto de perfil do Seu João" class="profile-pic">
                    <div>
                        <h1>OLÁ, SEU...!</h1>
                        <p>O que vamos fazer hoje?</p>
                    </div>
                </div>
                <img src="https://lh3.googleusercontent.com/p/AF1QipPjqwWeZ5Tf_bHVTfWYMDTJ3OdpHUO3fNsZksGg=w243-h174-n-k-no-nu"
                    alt="Logo Horta" class="logo-small">
            </header>

            <nav class="actions-section" style="padding: 20px;" aria-label="Ações rápidas">
                <a href="novo-plantio.html" class="card-acao">
                    <h3>+ Novo Plantio</h3>
                    <p>Iniciar nova cultura</p>
                </a>
            </nav>

            <section id="lista-plantios-dash" style="padding: 20px;" aria-labelledby="titulo-plantios">
                <h2 id="titulo-plantios" style="font-size: 1.2rem; margin: 0 0 10px 0;">Últimos Plantios:</h2>
                
                <div id="container-itens" aria-live="polite">
                    <!-- Itens do LocalStorage aparecem aqui -->
                </div>
            </section>

            <section class="map-section" style="padding: 20px;">
                <h2>Localização da Horta</h2>
                <iframe title="Mapa de localização da horta" src="https://share.google/lpinkk55uBXrwkOY7" width="100%" height="250"
                    style="border:3px solid black;" allowfullscreen="" loading="lazy"></iframe>
            </section>
        </section>
        
    </main>

    <script>
        const loginForm = document.getElementById('form-login');
        const loginScreen = document.getElementById('login-screen');
        const dashScreen = document.getElementById('dashboard-screen');
        
        function alternarTelas(mostrarDashboard) {
            if (mostrarDashboard) {
                loginScreen.classList.add('hidden');
                dashScreen.classList.remove('hidden');
                dashScreen.removeAttribute('aria-hidden');
                loginScreen.setAttribute('aria-hidden', 'true');
                carregarPlantiosNoDash();
            } else {
                loginScreen.classList.remove('hidden');
                dashScreen.classList.add('hidden');
                dashScreen.setAttribute('aria-hidden', 'true');
                loginScreen.removeAttribute('aria-hidden');
            }
        }

        function carregarPlantiosNoDash() {
            const container = document.getElementById('container-itens');
            const plantiosSalvos = JSON.parse(localStorage.getItem('meusPlantios')) || [];

            if (plantiosSalvos.length === 0) {
                container.innerHTML = "<p>Nenhum plantio registrado.</p>";
                return;
            }

            container.innerHTML = "";
            
            [...plantiosSalvos].reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-plantio';
                
                // Cálculo de sementes (25 sementes por m² conforme regra do agrônomo digital)
                const areaNum = parseFloat(item.area) || 0;
                const totalSementes = Math.round(areaNum * 25);

                // Montagem da estrutura com nós de texto seguros contra XSS
                const strongCultura = document.createElement('strong');
                strongCultura.textContent = "CULTURA: ";
                const txtCultura = document.createTextNode(`${item.cultura} | `);
                
                const strongArea = document.createElement('strong');
                strongArea.textContent = "ÁREA: ";
                const txtArea = document.createTextNode(`${item.area}m²\n`);
                
                const br1 = document.createElement('br');

                const strongSementes = document.createElement('strong');
                strongSementes.textContent = "SEMENTES NECESSÁRIAS: ";
                const txtSementes = document.createTextNode(`${totalSementes} un. (25/m²)\n`);
                
                const br2 = document.createElement('br');
                
                const strongData = document.createElement('strong');
                strongData.textContent = "DATA DE PLANTIO: ";
                const txtData = document.createTextNode(`${item.data} | `);

                const strongColheita = document.createElement('strong');
                strongColheita.textContent = "📅 COLHEITA: ";
                strongColheita.style.color = "#004d00";
                const txtColheita = document.createTextNode(`${item.colheita || 'Não informada'}`);

                // Inserção ordenada dos elementos
                div.appendChild(strongCultura);
                div.appendChild(txtCultura);
                div.appendChild(strongArea);
                div.appendChild(txtArea);
                div.appendChild(br1);
                div.appendChild(strongSementes);
                div.appendChild(txtSementes);
                div.appendChild(br2);
                div.appendChild(strongData);
                div.appendChild(txtData);
                div.appendChild(strongColheita);
                div.appendChild(txtColheita);
                
                container.appendChild(div);
            });
        }

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('logado') === 'true') {
            alternarTelas(true);
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            alternarTelas(true);
        });
    </script>
</body>
</html>
